services:
  # PostgreSQL Database with PgVector Extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: inframind-postgres
    environment:
      POSTGRES_USER: saym
      POSTGRES_PASSWORD: Saym7296
      POSTGRES_DB: inframind-ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saym -d inframind-ai"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inframind-network

  # PgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:8.14.0
    container_name: inframind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: saym@outlook.de
      PGADMIN_DEFAULT_PASSWORD: Saym7296
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - inframind-network

  # Redis Cache
  redis:
    image: redis:7.4.2-alpine
    container_name: inframind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inframind-network

volumes:
  postgres_data:

networks:
  inframind-network:
    name: inframind-network
    driver: bridge
