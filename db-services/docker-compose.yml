services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.5
    container_name: inframind-postgres
    environment:
      POSTGRES_USER: saym
      POSTGRES_PASSWORD: Saym7296
      POSTGRES_DB: inframind-ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saym -d inframind-ai"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inframind-network

  # PgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:8.14.0
    container_name: inframind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: saym@outlook.de
      PGADMIN_DEFAULT_PASSWORD: Saym7296
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - inframind-network

  # Redis Cache
  redis:
    image: redis:7.4.2
    container_name: inframind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inframind-network

  # Milvus etcd
  etcd:
    container_name: inframind-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - inframind-network

  # Milvus MinIO
  minio:
    container_name: inframind-milvus-minio
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - inframind-network

  # Milvus Vector Database
  milvus:
    container_name: inframind-milvus-standalone
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - inframind-network

volumes:
  postgres_data:

networks:
  inframind-network:
    name: inframind-network
    driver: bridge
